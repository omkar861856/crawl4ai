# Shared configuration for all environments
x-base-config: &base-config
  env_file:
    - .llm.env       # API keys (create from .llm.env.example)
  # Uncomment to set default environment variables (will overwrite .llm.env)
  # environment:
  #   - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #   - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
  #   - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #   - GROQ_API_KEY=${GROQ_API_KEY:-}
  #   - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
  #   - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
  #   - GEMINI_API_KEY=${GEMINI_API_KEY:-}
  #   - LLM_PROVIDER=${LLM_PROVIDER:-}  # Optional: Override default provider (e.g., "anthropic/claude-3-opus")
  volumes:
    - /dev/shm:/dev/shm  # Chromium performance
    - /root/volumes/crawl4ai:/data
  deploy:
    resources:
      limits:
        memory: 4G
      reservations:
        memory: 1G
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  user: "appuser"
  networks:
    - traefik

services:
  crawl4ai:
    container_name: crawl4ai
    # 1. Default: Pull multi-platform test image from Docker Hub
    # 2. Override with local image via: IMAGE=local-test docker compose up
    image: ${IMAGE:-unclecode/crawl4ai:${TAG:-latest}}
    
    # Local build config (used with --build)
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_TYPE: ${INSTALL_TYPE:-default}
        ENABLE_GPU: ${ENABLE_GPU:-false}
    
    # Inherit shared config
    <<: *base-config

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.crawl4ai.rule=Host(`crawl4ai.ecotron.co.in`)"
      - "traefik.http.routers.crawl4ai.entrypoints=websecure"
      - "traefik.http.routers.crawl4ai.tls.certresolver=myresolver"
      - "traefik.http.services.crawl4ai.loadbalancer.server.port=11235"

networks:
  traefik:
    external: true